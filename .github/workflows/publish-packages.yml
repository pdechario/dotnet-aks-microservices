name: Build and Publish Packages

on:
  push:
    branches:
      - main
    paths:
      - 'platform/common/**'
      - 'platform/observability/**'
      - 'product/tasks/**'
      - 'product/users/**'
      - 'product/notifications/**'
      - 'product/taskscli/**'
      - 'platform/gateway/**'
      - '.github/workflows/publish-packages.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  REGISTRY: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

jobs:
  publish-common:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Common
        run: dotnet restore platform/common/Common.csproj

      - name: Build Common
        run: dotnet build platform/common/Common.csproj -c Release --no-restore

      - name: Pack Common
        run: dotnet pack platform/common/Common.csproj -c Release --no-build -o ./dist

      - name: Publish Common to GitHub Packages
        run: |
          dotnet nuget push ./dist/*.nupkg \
            --source "${{ env.REGISTRY }}" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

  publish-observability:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Observability
        run: dotnet restore platform/observability/Observability.csproj

      - name: Build Observability
        run: dotnet build platform/observability/Observability.csproj -c Release --no-restore

      - name: Pack Observability
        run: dotnet pack platform/observability/Observability.csproj -c Release --no-build -o ./dist

      - name: Publish Observability to GitHub Packages
        run: |
          dotnet nuget push ./dist/*.nupkg \
            --source "${{ env.REGISTRY }}" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

  publish-services:
    needs: publish-common
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        service:
          - { name: tasks,         path: product/tasks/Tasks.csproj,                 dll: Tasks }
          - { name: users,         path: product/users/Users.csproj,                 dll: Users }
          - { name: notifications, path: product/notifications/Notifications.csproj, dll: Notifications }
          - { name: gateway,       path: platform/gateway/Gateway.csproj,            dll: Gateway }
          - { name: taskscli,      path: product/taskscli/TasksCli.csproj,           dll: TasksCli }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Add GitHub Packages source
        run: |
          dotnet nuget add source "${{ env.REGISTRY }}" \
            --name github \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text || true

      - name: Restore ${{ matrix.service.name }}
        run: dotnet restore ${{ matrix.service.path }}
        env:
          GITHUB_ACTIONS: "true"

      - name: Build ${{ matrix.service.name }}
        run: dotnet build ${{ matrix.service.path }} -c Release --no-restore
        env:
          GITHUB_ACTIONS: "true"

      - name: Pack ${{ matrix.service.name }}
        run: dotnet pack ${{ matrix.service.path }} -c Release --no-build -o ./dist-${{ matrix.service.name }}
        env:
          GITHUB_ACTIONS: "true"

      - name: Publish ${{ matrix.service.name }} to GitHub Packages
        run: |
          dotnet nuget push ./dist-${{ matrix.service.name }}/*.nupkg \
            --source "${{ env.REGISTRY }}" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

      - name: Upload ${{ matrix.service.name }} package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-${{ matrix.service.name }}
          path: ./dist-${{ matrix.service.name }}/*.nupkg
          retention-days: 30
