services:
  gateway:
    build:
      context: ./src/Gateway
      dockerfile: Dockerfile.Gateway
    ports:
      - "5000:8080"
    depends_on:
      - users
      - tasks
      - notifications

  users:
    build:
      context: ./src/Users
      dockerfile: Dockerfile.Users
    ports:
      - "5001:8080"

  tasks:
    build:
      context: ./src/Tasks
      dockerfile: Dockerfile.Tasks
    ports:
      - "5002:8080"

  notifications:
    build:
      context: ./src/Notifications
      dockerfile: Dockerfile.Notifications
    ports:
      - "5003:8080"
